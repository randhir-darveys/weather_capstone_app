name: weather_capstone_app
description: "A new Flutter project."

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
version: 1.0.0+1

environment:
  sdk: ^3.12.0

# Dependencies specify other packages that your package needs in order to work.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  cupertino_icons: ^1.0.8

  # HTTP package for REST API calls.
  http: ^1.6.0

  # Package for generating launcher app icons.
  flutter_launcher_icons: ^0.14.4

  # Package for generating native splash screen.
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Recommended lint rules for good coding practices.
  flutter_lints: ^6.0.0

# The following section is specific to Flutter packages.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application.
  uses-material-design: true

  # Assets used in the application.
  assets:
    - assets/images/
    - assets/icons/

  # To add custom fonts to your application, add a fonts section here.
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic

# App launcher icon configuration.
# This must be at root level, not inside flutter.
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21

# Native splash screen configuration.
# This must be at root level, not inside flutter.
flutter_native_splash:
  color: "#2563EB"
  image: assets/images/splash_logo.png

  android_12:
    color: "#2563EB"
    image: assets/images/splash_logo.png

  android: true
  ios: true
  web: false